<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Replenishment Daily Metrics</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.47.0/iconfont/tabler-icons.min.css">
<style>
/* ============================================================
   LIGHT PROFESSIONAL THEME — Leadership-ready
   ============================================================ */
:root{
  --bg:#f0f2f5;
  --bg2:#ffffff;
  --bg3:#f8f9fc;
  --bg4:#eef0f5;
  --text:#1a1e2e;
  --text2:#4a5068;
  --text3:#8a92a8;
  --border:#e2e6ef;
  --border2:#d0d5e5;
  --teal:#00875a;
  --teal-light:#e6f7f2;
  --teal-mid:#b3e8d8;
  --blue:#1a6acc;
  --blue-light:#e8f1fb;
  --amber:#b45309;
  --amber-light:#fef3c7;
  --red:#c0392b;
  --red-light:#fde8e8;
  --purple:#5b21b6;
  --purple-light:#ede9fe;
  --green:#065f46;
  --green-light:#d1fae5;
  --coral:#c2410c;
  --coral-light:#ffedd5;
  --shadow:0 1px 4px rgba(0,0,0,.08);
  --shadow2:0 4px 16px rgba(0,0,0,.10);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;background:var(--bg);color:var(--text);font-size:13px;min-height:100vh}
.app{max-width:1440px;margin:0 auto;padding:16px}

/* Login */
.center-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#e8f1fb 0%,#e6f7f2 100%)}
.login-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:36px;width:380px;box-shadow:var(--shadow2)}
.login-logo{width:48px;height:48px;background:linear-gradient(135deg,#00875a,#1a6acc);border-radius:12px;display:flex;align-items:center;justify-content:center;margin-bottom:16px;font-size:22px;color:#fff}
.login-card h1{font-size:20px;font-weight:700;color:var(--text);margin-bottom:4px}
.login-card p{font-size:12px;color:var(--text3);margin-bottom:22px}
.login-card input{width:100%;padding:11px 14px;border:1px solid var(--border2);border-radius:8px;margin-bottom:12px;background:var(--bg3);color:var(--text);font-size:13px;outline:none;transition:border .2s}
.login-card input:focus{border-color:var(--teal);background:#fff}
.login-card button{width:100%;padding:12px;border:none;border-radius:8px;background:linear-gradient(135deg,var(--teal),var(--blue));color:#fff;font-weight:700;cursor:pointer;font-size:14px;letter-spacing:.3px}
.login-err{color:var(--red);font-size:12px;margin-top:8px;min-height:16px}

/* Topbar */
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;background:var(--bg2);border-radius:12px;padding:14px 20px;border:1px solid var(--border);box-shadow:var(--shadow);flex-wrap:wrap;gap:8px}
.topbar-left{display:flex;align-items:center;gap:12px}
.topbar-icon{width:36px;height:36px;background:linear-gradient(135deg,#00875a,#1a6acc);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;color:#fff;flex-shrink:0}
.topbar-title{font-size:17px;font-weight:800;color:var(--text)}
.topbar-meta{font-size:11px;color:var(--text3);margin-top:2px}
.topbar-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap}

/* Buttons */
.btn{font-size:12px;font-weight:600;border-radius:8px;padding:7px 14px;cursor:pointer;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);transition:all .15s}
.btn:hover{background:var(--bg4);border-color:var(--border2);color:var(--text)}
.btn.primary{background:linear-gradient(135deg,var(--teal),var(--blue));color:#fff;border:none;box-shadow:0 2px 8px rgba(0,135,90,.25)}
.btn.primary:hover{opacity:.9}
.btn.danger{color:var(--red);border-color:#e8b4b4;background:#fff8f8}

/* Pills */
.pill{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.pill-green{background:var(--green-light);color:var(--green)}
.pill-amber{background:var(--amber-light);color:var(--amber)}
.pill-red{background:var(--red-light);color:var(--red)}
.pill-blue{background:var(--blue-light);color:var(--blue)}
.pill-purple{background:var(--purple-light);color:var(--purple)}
.pill-teal{background:var(--teal-light);color:var(--teal)}

/* Nav */
nav{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:14px;background:var(--bg2);border-radius:12px;padding:6px;border:1px solid var(--border);box-shadow:var(--shadow)}
nav button{padding:9px 15px;border-radius:8px;border:none;background:transparent;cursor:pointer;font-size:12px;font-weight:600;color:var(--text2);transition:all .15s}
nav button.active{background:linear-gradient(135deg,var(--teal),var(--blue));color:#fff;box-shadow:0 2px 8px rgba(0,135,90,.2)}
nav button:hover:not(.active){background:var(--bg4);color:var(--text)}
.dash{display:none}.dash.active{display:block}

/* KPI Grid */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;margin-bottom:14px}
.kpi{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px 18px;box-shadow:var(--shadow);transition:all .2s;position:relative;overflow:hidden}
.kpi:hover{box-shadow:var(--shadow2);transform:translateY(-1px)}
.kpi::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:12px 12px 0 0;background:var(--teal)}
.kpi.amber::after{background:var(--amber)}
.kpi.red::after{background:var(--red)}
.kpi.blue::after{background:var(--blue)}
.kpi.purple::after{background:var(--purple)}
.kpi.coral::after{background:var(--coral)}
.kpi-icon{font-size:22px;margin-bottom:8px;line-height:1}
.kpi-label{font-size:10px;color:var(--text3);margin-bottom:5px;font-weight:700;text-transform:uppercase;letter-spacing:.06em}
.kpi-value{font-size:24px;font-weight:800;color:var(--text);line-height:1}
.kpi-sub{font-size:11px;color:var(--text3);margin-top:6px;font-weight:500}

/* Cards */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:14px;box-shadow:var(--shadow)}
.card-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:4px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.card-sub{font-size:11px;color:var(--text3);margin-bottom:12px}
.card-header{background:linear-gradient(135deg,var(--bg3),var(--bg2));border-radius:10px;padding:14px 16px;margin-bottom:12px;border:1px solid var(--border)}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:14px}
@media(max-width:900px){.two-col,.three-col{grid-template-columns:1fr}}

/* Tables */
table{width:100%;border-collapse:collapse;font-size:12px}
thead{position:sticky;top:0;z-index:2}
th{background:var(--bg3);padding:10px 12px;text-align:left;font-weight:700;border-bottom:2px solid var(--border2);white-space:nowrap;color:var(--text2);font-size:11px;text-transform:uppercase;letter-spacing:.04em}
td{padding:9px 12px;border-bottom:1px solid var(--border);white-space:nowrap;color:var(--text)}
tr:last-child td{border-bottom:none}
tr:hover td{background:#f8f9fc}
.table-scroll{overflow-x:auto;max-height:400px;overflow-y:auto;border-radius:8px;border:1px solid var(--border)}
.table-striped tr:nth-child(even) td{background:var(--bg3)}

/* Charts */
canvas{width:100%!important;max-height:250px}

/* Download button */
.dl-btn{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;color:var(--teal);background:var(--teal-light);border:1px solid var(--teal-mid);border-radius:7px;padding:5px 11px;cursor:pointer;transition:all .15s}
.dl-btn:hover{background:var(--teal-mid)}

/* Filter bar */
.filter-bar{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px 16px;margin-bottom:14px;display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end;box-shadow:var(--shadow)}
.filter-item{display:flex;flex-direction:column;gap:4px}
.filter-item label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.05em}
.filter-item select,.filter-item input{font-size:12px;padding:7px 10px;border-radius:7px;border:1px solid var(--border2);background:#fff;color:var(--text);min-width:130px;outline:none;transition:border .15s}
.filter-item select:focus{border-color:var(--teal)}
.filter-clear{font-size:11px;color:var(--red);cursor:pointer;background:none;border:none;font-weight:700;padding:5px}
.gran-toggle{display:flex;gap:3px;background:var(--bg3);border-radius:8px;padding:3px;border:1px solid var(--border)}
.gran-toggle button{padding:6px 13px;border-radius:6px;border:none;background:transparent;font-size:11px;font-weight:700;cursor:pointer;color:var(--text2);transition:all .15s}
.gran-toggle button.active{background:linear-gradient(135deg,var(--teal),var(--blue));color:#fff;box-shadow:0 2px 6px rgba(0,135,90,.2)}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(26,30,46,.5);display:flex;align-items:center;justify-content:center;z-index:50;padding:20px;backdrop-filter:blur(3px)}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:24px;width:580px;max-width:94vw;max-height:88vh;overflow-y:auto;box-shadow:0 24px 60px rgba(0,0,0,.15)}
.modal h3{margin-bottom:14px;font-size:15px;font-weight:700;color:var(--text)}
.modal input,.modal select{width:100%;padding:9px 12px;border:1px solid var(--border2);border-radius:8px;margin-bottom:10px;background:#fff;color:var(--text);font-size:13px;outline:none}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
.upload-box{border:2px dashed var(--border2);border-radius:10px;padding:24px;text-align:center;margin-bottom:14px;background:var(--bg3);transition:border .2s}
.upload-box:hover{border-color:var(--teal)}

/* Insights */
.insight-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px 18px;font-size:13px;line-height:1.7;margin-bottom:10px;border-left:4px solid var(--teal);box-shadow:var(--shadow)}
.insight-card.warn{border-left-color:var(--amber);background:var(--amber-light)}
.insight-card.danger{border-left-color:var(--red);background:var(--red-light)}
.insight-card b{color:var(--teal)}
.insight-card.warn b{color:var(--amber)}
.insight-card.danger b{color:var(--red)}

/* JIT Badge */
.jit-badge{display:inline-flex;align-items:center;gap:6px;background:linear-gradient(135deg,#e6f7f2,#e8f1fb);border:1px solid var(--teal-mid);border-radius:8px;padding:8px 14px;font-size:12px;font-weight:700;color:var(--teal);margin-bottom:12px}

/* Misc */
.refresh-badge{font-size:11px;color:var(--teal);background:var(--teal-light);border-radius:6px;padding:4px 10px;display:none;font-weight:700;border:1px solid var(--teal-mid)}
.refresh-badge.show{display:inline-block}
.toast{position:fixed;bottom:24px;right:24px;background:var(--text);color:#fff;padding:12px 18px;border-radius:10px;font-size:12px;font-weight:600;z-index:100;display:none;box-shadow:var(--shadow2)}
.toast.show{display:block}
.hidden{display:none!important}
.section-label{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin:14px 0 8px;display:flex;align-items:center;gap:8px}
.section-label::after{content:'';flex:1;height:1px;background:var(--border)}
.tab-mini{display:flex;gap:4px;margin-bottom:10px}
.tab-mini button{padding:5px 12px;border-radius:6px;border:1px solid var(--border2);background:var(--bg3);font-size:11px;font-weight:700;cursor:pointer;color:var(--text2);transition:all .15s}
.tab-mini button.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.tat-good{color:var(--green);font-weight:700}
.tat-warn{color:var(--amber);font-weight:700}
.tat-bad{color:var(--red);font-weight:700}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen" class="center-screen">
  <div class="login-card">
    <div class="login-logo">📦</div>
    <h1>Replenishment Metrics</h1>
    <p>Sign in to access the dashboard</p>
    <input type="text" id="loginUser" placeholder="Username" autocomplete="username">
    <input type="password" id="loginPass" placeholder="Password" autocomplete="current-password">
    <button onclick="doLogin()">Sign in →</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<!-- MAIN APP -->
<div id="appScreen" class="app hidden">
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-icon">📦</div>
      <div>
        <div class="topbar-title">Replenishment Daily Metrics</div>
        <div class="topbar-meta" id="metaLine">Loading…</div>
      </div>
    </div>
    <div class="topbar-right">
      <span class="refresh-badge" id="refreshBadge">↻ Refreshed</span>
      <span class="pill" id="roleBadge"></span>
      <button class="btn" id="adminBtn" onclick="openAdminPanel()" style="display:none">⚙ Admin</button>
      <button class="btn danger" onclick="doLogout()">Sign out</button>
    </div>
  </div>

  <div id="noDataCard" class="card hidden" style="text-align:center;color:var(--text3);padding:48px">
    <div style="font-size:40px;margin-bottom:12px">📭</div>
    <div style="font-size:15px;font-weight:600;color:var(--text2)">No data uploaded yet</div>
    <div style="margin-top:6px">Ask your admin to upload today's CSV file.</div>
  </div>

  <div id="dashboardWrap" class="hidden">
    <div class="filter-bar" id="filterBar"></div>
    <nav id="navBar"></nav>
    <div id="tab-overview" class="dash active"></div>
    <div id="tab-supplier" class="dash"></div>
    <div id="tab-entity" class="dash"></div>
    <div id="tab-tat" class="dash"></div>
    <div id="tab-pendency" class="dash"></div>
    <div id="tab-jit" class="dash"></div>
    <div id="tab-insights" class="dash"></div>
  </div>
</div>

<div id="modalRoot"></div>
<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
Chart.defaults.color='#8a92a8';
Chart.defaults.borderColor='#e2e6ef';
Chart.defaults.font.family='-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Arial,sans-serif';
Chart.defaults.font.size=11;

let CURRENT_USER=null,LAST_VERSION=-1,LATEST_PAYLOAD=null;
let chartInstances=[];
let GRAN='day',PERIOD='',F_SUP='',F_ENT='',F_STO='',F_CITY='';
let procAgeFilter='all'; // all / auto / manual

function destroyCharts(){chartInstances.forEach(c=>{try{c.destroy()}catch(e){}});chartInstances=[];}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}

function fmtNum(n){
  if(n==null||isNaN(n))return '—';
  const s=n<0?'-':'';const a=Math.abs(n);
  if(a>=1e7)return s+(a/1e7).toFixed(2)+' Cr';
  if(a>=1e5)return s+(a/1e5).toFixed(2)+' L';
  return Math.round(n).toLocaleString('en-IN');
}
function fmtH(n){return(n==null||n===undefined)?'—':n.toFixed(1)+'h'}
function fmtPct(n){return(n==null||n===undefined)?'—':n.toFixed(1)+'%'}
function pctSafe(a,b){return b?Math.round(a/b*1000)/10:0;}
function tatColor(h){return h==null?'':h>72?'tat-bad':h>24?'tat-warn':'tat-good';}

const MN=['January','February','March','April','May','June','July','August','September','October','November','December'];
const MA=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function ordSfx(n){const v=n%100;if(v>=11&&v<=13)return'th';switch(n%10){case 1:return'st';case 2:return'nd';case 3:return'rd';default:return'th';}}
function fmtWeek(k){if(!k)return'';const s=new Date(k+'T00:00:00'),e=new Date(s);e.setDate(e.getDate()+6);return`${String(s.getDate()).padStart(2,'0')}${ordSfx(s.getDate())} ${MN[s.getMonth()]} – ${String(e.getDate()).padStart(2,'0')}${ordSfx(e.getDate())} ${MN[e.getMonth()]}`;}
function fmtWeekShort(k){if(!k)return'';const s=new Date(k+'T00:00:00'),e=new Date(s);e.setDate(e.getDate()+6);return s.getMonth()===e.getMonth()?`${s.getDate()}-${e.getDate()} ${MA[s.getMonth()]}`:`${s.getDate()} ${MA[s.getMonth()]}-${e.getDate()} ${MA[e.getMonth()]}`;}
function fmtMonth(m){if(!m)return'';const[y,mo]=m.split('-');return MN[parseInt(mo)-1]+' '+y;}

function csvEscape(v){if(v==null)return'';const s=String(v);if(/[",\n]/.test(s))return'"'+s.replace(/"/g,'""')+'"';return s;}
function dlCSV(rows,cols,fname){
  if(!rows||!rows.length){showToast('No rows to export');return;}
  const blob=new Blob([[[...cols.map(c=>c.label)].join(','),...rows.map(r=>cols.map(c=>csvEscape(c.get(r))).join(','))].join('\n')],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=fname;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}
function dlServer(){const p=new URLSearchParams({granularity:GRAN,period:PERIOD,supplier:F_SUP,entity:F_ENT,store:F_STO,city:F_CITY});window.open('/api/export/rows?'+p,'_blank');}

// ---- Auth ----
async function doLogin(){
  const u=document.getElementById('loginUser').value.trim(),p=document.getElementById('loginPass').value;
  const err=document.getElementById('loginErr');err.textContent='';
  try{
    const fd=new FormData();fd.append('username',u);fd.append('password',p);
    const res=await fetch('/api/login',{method:'POST',body:fd});
    if(!res.ok){const j=await res.json().catch(()=>({}));err.textContent=j.detail||'Login failed';return;}
    await boot();
  }catch(e){err.textContent='Could not reach server.';}
}
async function doLogout(){await fetch('/api/logout',{method:'POST'});location.reload();}

async function boot(){
  const me=await fetch('/api/me');
  if(!me.ok){document.getElementById('loginScreen').classList.remove('hidden');document.getElementById('appScreen').classList.add('hidden');return;}
  CURRENT_USER=await me.json();
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('appScreen').classList.remove('hidden');
  const rb=document.getElementById('roleBadge');
  rb.textContent=CURRENT_USER.role.toUpperCase();
  rb.className='pill '+(CURRENT_USER.role==='admin'?'pill-purple':'pill-teal');
  if(CURRENT_USER.role==='admin')document.getElementById('adminBtn').style.display='inline-block';
  buildNav();await refreshAll();startPolling();
}
function buildNav(){
  const tabs=[
    {id:'overview',label:'📊 Overview'},{id:'supplier',label:'🏪 Supplier'},
    {id:'entity',label:'🏷 Entity'},{id:'tat',label:'⏱ TAT & Processing'},
    {id:'pendency',label:'⏳ Pendency'},{id:'jit',label:'⚡ JIT'},{id:'insights',label:'💡 Insights'}
  ];
  document.getElementById('navBar').innerHTML=tabs.map((t,i)=>`<button class="${i===0?'active':''}" onclick="switchTab('${t.id}',this)">${t.label}</button>`).join('');
}
function switchTab(id,btn){
  document.querySelectorAll('.dash').forEach(d=>d.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');btn.classList.add('active');
}
function startPolling(){setInterval(async()=>{
  try{const r=await fetch('/api/version');if(!r.ok)return;const m=await r.json();
    if(m.version!==LAST_VERSION){await refreshAll();
      const b=document.getElementById('refreshBadge');b.classList.add('show');setTimeout(()=>b.classList.remove('show'),4000);
      showToast('Dashboard refreshed with latest data.');}}catch(e){}},15000);}

async function refreshAll(){
  const vr=await fetch('/api/version');const meta=await vr.json();LAST_VERSION=meta.version;
  if(!meta.total_rows){
    document.getElementById('noDataCard').classList.remove('hidden');
    document.getElementById('dashboardWrap').classList.add('hidden');
    document.getElementById('metaLine').textContent='No data uploaded yet.';return;}
  document.getElementById('metaLine').textContent=
    `${meta.total_rows.toLocaleString('en-IN')} rows · ${meta.min_date} to ${meta.max_date}`+
    (meta.last_upload?` · Last upload: ${meta.last_upload.filename} by ${meta.last_upload.uploaded_by} on ${new Date(meta.last_upload.uploaded_at).toLocaleString()}`:'');
  document.getElementById('noDataCard').classList.add('hidden');
  document.getElementById('dashboardWrap').classList.remove('hidden');
  await loadData();
}

async function loadData(){
  ['overview','supplier','entity','tat','pendency','jit','insights'].forEach(id=>{
    const el=document.getElementById('tab-'+id);
    if(el&&el.classList.contains('active'))
      el.innerHTML='<div class="card" style="text-align:center;color:var(--text3);padding:40px"><div style="font-size:24px;margin-bottom:8px">⏳</div>Loading…</div>';
  });
  try{
    const p=new URLSearchParams({granularity:GRAN,period:PERIOD,supplier:F_SUP,entity:F_ENT,store:F_STO,city:F_CITY});
    const res=await fetch('/api/data?'+p);
    if(!res.ok){const err=await res.json().catch(()=>({detail:'Server error '+res.status}));
      document.getElementById('tab-overview').innerHTML=`<div class="card" style="text-align:center;color:var(--red);padding:30px">⚠ ${err.detail}</div>`;return;}
    const d=await res.json();LATEST_PAYLOAD=d;
    buildFilterBar(d.filters_meta);
    if(!d.summary){
      ['overview','supplier','entity','tat','pendency','jit','insights'].forEach(id=>{
        document.getElementById('tab-'+id).innerHTML='<div class="card" style="text-align:center;color:var(--text3);padding:30px">No rows match the current filters.</div>';});return;}
    destroyCharts();
    const renders=[
      ['overview',()=>renderOverview(d)],['supplier',()=>renderSupplier(d)],
      ['entity',()=>renderEntity(d)],['tat',()=>renderTAT(d)],
      ['pendency',()=>renderPendency(d)],['jit',()=>renderJIT(d)],['insights',()=>renderInsights(d)]
    ];
    for(const[id,fn] of renders){
      try{fn();}catch(e){
        console.error(`Tab ${id} render error:`,e);
        document.getElementById('tab-'+id).innerHTML=`<div class="card" style="text-align:center;color:var(--red);padding:30px">⚠ Render error in ${id}: ${e.message}</div>`;
      }
    }
  }catch(e){console.error('loadData:',e);
    document.getElementById('tab-overview').innerHTML=`<div class="card" style="text-align:center;color:var(--red);padding:30px">⚠ Failed to load: ${e.message}</div>`;}
}

function buildFilterBar(meta){
  const opts=GRAN==='day'?meta.days:GRAN==='week'?meta.weeks:meta.months;
  const lbl=p=>GRAN==='day'?p:GRAN==='week'?fmtWeek(p):fmtMonth(p);
  document.getElementById('filterBar').innerHTML=`
  <div class="filter-item"><label>Granularity</label>
    <div class="gran-toggle">
      <button class="${GRAN==='day'?'active':''}" onclick="setGran('day')">Daily</button>
      <button class="${GRAN==='week'?'active':''}" onclick="setGran('week')">Weekly</button>
      <button class="${GRAN==='month'?'active':''}" onclick="setGran('month')">Monthly</button>
    </div></div>
  <div class="filter-item"><label>Period</label><select onchange="setF('period',this.value)"><option value="">All periods</option>${opts.map(p=>`<option value="${p}" ${p===PERIOD?'selected':''}>${lbl(p)}</option>`).join('')}</select></div>
  <div class="filter-item"><label>Supplier</label><select onchange="setF('supplier',this.value)"><option value="">All suppliers</option>${meta.suppliers.map(s=>`<option value="${s}" ${s===F_SUP?'selected':''}>${s}</option>`).join('')}</select></div>
  <div class="filter-item"><label>Entity</label><select onchange="setF('entity',this.value)"><option value="">All entities</option>${meta.entities.map(e=>`<option value="${e}" ${e===F_ENT?'selected':''}>${e}</option>`).join('')}</select></div>
  <div class="filter-item"><label>Store</label><select onchange="setF('store',this.value)"><option value="">All stores</option>${meta.stores.map(s=>`<option value="${s}" ${s===F_STO?'selected':''}>${s}</option>`).join('')}</select></div>
  <div class="filter-item"><label>City</label><select onchange="setF('city',this.value)"><option value="">All cities</option>${meta.cities.map(c=>`<option value="${c}" ${c===F_CITY?'selected':''}>${c}</option>`).join('')}</select></div>
  <button class="filter-clear" onclick="clearF()">✕ Clear</button>
  <button class="dl-btn" onclick="dlServer()"><i class="ti ti-download"></i> Export rows</button>`;
}
function setGran(g){GRAN=g;PERIOD='';loadData();}
function setF(k,v){if(k==='period')PERIOD=v;if(k==='supplier')F_SUP=v;if(k==='entity')F_ENT=v;if(k==='store')F_STO=v;if(k==='city')F_CITY=v;loadData();}
function clearF(){PERIOD='';F_SUP='';F_ENT='';F_STO='';F_CITY='';loadData();}

function kpiCard(icon,label,value,sub,cls){
  return`<div class="kpi ${cls||''}"><div class="kpi-icon">${icon}</div><div class="kpi-label">${label}</div><div class="kpi-value">${value}</div><div class="kpi-sub">${sub||''}</div></div>`;
}
function tblDlBtn(data,cols,fname){
  const safe=JSON.stringify(data).replace(/'/g,"\\'").replace(/"/g,'&quot;');
  return `<button class="dl-btn" onclick='dlCSV(${JSON.stringify(data)},${JSON.stringify(cols)},"${fname}")'><i class="ti ti-download"></i> CSV</button>`;
}

function setProcAgeFilter(f){procAgeFilter=f;if(!LATEST_PAYLOAD)return;
  // Re-render just the proc ageing section
  const tabs=document.querySelectorAll('#tab-tat .tab-mini button');
  tabs.forEach(b=>b.classList.toggle('active',b.textContent.toLowerCase()===f));
  renderProcAgeChart(LATEST_PAYLOAD.proc_ageing);
}

function renderProcAgeChart(pa){
  if(!pa)return;
  const qtyKey=procAgeFilter==='auto'?'auto_qty':procAgeFilter==='manual'?'manual_qty':'qty';
  const skuKey=procAgeFilter==='auto'?'auto_sku':procAgeFilter==='manual'?'manual_sku':'sku';
  const totalQty=pa.reduce((a,b)=>a+(b[qtyKey]||0),0);
  const CHART_ID='chartProcAge';
  const existing=chartInstances.findIndex(c=>c.canvas&&c.canvas.id===CHART_ID);
  if(existing>=0){try{chartInstances[existing].destroy()}catch(e){}chartInstances.splice(existing,1);}
  const ctx=document.getElementById(CHART_ID);
  if(ctx){
    const colors=['#00875a','#1a6acc','#5b21b6','#b45309','#c2410c','#6b7280'];
    const c=new Chart(ctx,{type:'bar',data:{labels:pa.map(x=>x.label),datasets:[{label:'Qty',data:pa.map(x=>x[qtyKey]||0),backgroundColor:colors,borderRadius:6}]},options:{plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{callback:v=>fmtNum(v)}}}}});
    chartInstances.push(c);
  }
  const tbl=document.getElementById('procAgeTable');
  if(tbl) tbl.innerHTML=`<table class="table-striped"><thead><tr><th>Processing TAT Bucket</th><th>Qty</th><th>SKU Lines</th><th>Orders</th><th>% of Total Landed</th></tr></thead><tbody>
  ${pa.map(b=>`<tr><td><strong>${b.label}</strong></td><td>${fmtNum(b[qtyKey]||0)}</td><td>${fmtNum(b[skuKey]||0)}</td><td>${fmtNum(b.orders)}</td>
    <td><span class="pill ${(b[qtyKey]||0)>0&&b.label.includes('≤ 12')?'pill-green':b.label.includes('Not')?'pill-amber':'pill-teal'}">${fmtPct(pctSafe(b[qtyKey]||0,totalQty))}</span></td></tr>`).join('')}
  </tbody></table>`;
}

function renderInsights(d){
  const s=d.summary;

  const topEnt=(d.by_entity||[]).sort((a,b)=>b.qty-a.qty)[0];
  const worstAge=[...(d.pendency_ageing||[])].reverse().find(b=>b.qty>0);
  const peakHour=(d.hour_landing||[]).sort((a,b)=>b.qty-a.qty)[0];
  const fastestProc=(d.proc_ageing||[]).find(b=>b.label.includes('≤ 12'));

  document.getElementById('tab-insights').innerHTML=`

  <div class="insight-card">
    <b>📦 Volume:</b> Total landing is <strong>${fmtNum(s.total_qty)} units</strong> across <strong>${fmtNum(s.total_sku)} SKU lines</strong>.
    ${topEnt?` <strong>${topEnt.name}</strong> is the dominant entity at ${fmtNum(topEnt.qty)} units (${fmtPct(pctSafe(topEnt.qty,s.total_qty))} of total).`:''}
    JIT accounts for <strong>${fmtPct(s.jit_pct)}</strong> of total volume.
    ${peakHour?` Peak landing window is <strong>${peakHour.label}</strong> with ${fmtNum(peakHour.qty)} units (${fmtPct(peakHour.pct_of_total)} of total) — consider aligning processing staff to this window.`:''}
  </div>
  <div class="insight-card ${s.pushback_pct>5?'warn':''}">
    <b>${s.pushback_pct>5?'⚠ Concern':'✓'} Pushback:</b> Overall pushback is <strong>${fmtPct(s.pushback_pct)}</strong> of total landed qty (excl. cancelled).
    ${topPB?` <strong>${topPB.name}</strong> has the highest pushback rate at ${fmtPct(topPB.pushback_pct)}${topPB.pushback_pct>10?' — this supplier requires immediate review.':'.'}`:' No significant pushback detected.'}
  </div>
  <div class="insight-card ${s.avg_proc_tat>24?'danger':s.avg_proc_tat>12?'warn':''}">
    <b>${s.avg_proc_tat>24?'⚠ Action needed':'⏱'} TAT:</b> Average processing TAT is <strong>${fmtH(s.avg_proc_tat)}</strong> (P80: ${fmtH(s.p80_proc_tat)}).
    ${slowSup?` <strong>${slowSup.name}</strong> is the slowest supplier at ${fmtH(slowSup.avg_proc_tat)} avg.`:''}

  </div>
  <div class="insight-card ${worstAge&&worstAge.qty>0?'warn':''}">
    <b>⏳ Pendency:</b> <strong>${fmtNum(s.pending_qty)} units</strong> (${fmtNum(s.pending_orders)} orders) are pending.
    ${worstAge&&worstAge.qty>0?`The <strong>${worstAge.label}</strong> bucket has ${fmtNum(worstAge.qty)} units — highest priority for escalation.`:'No aged pendency outstanding — excellent!'}
  </div>
  <div class="insight-card">
    <b>⚡ JIT:</b> JIT avg proc TAT is <strong>${fmtH(s.jit_avg_proc_tat)}</strong> (P80: ${fmtH(s.jit_p80_proc_tat)}).

// ========== Chart helpers ==========
function mkLine(id,labels,series){
  const ctx=document.getElementById(id);if(!ctx)return;
  const c=new Chart(ctx,{type:'line',data:{labels,datasets:series.map(s=>({
    label:s.label,data:s.data,borderColor:s.color,
    backgroundColor:s.fill?s.color+'18':'transparent',
    fill:!!s.fill,borderWidth:2.5,pointRadius:0,pointHoverRadius:4,tension:.4,spanGaps:true
  }))},options:{plugins:{legend:{position:'top',labels:{boxWidth:12}}},scales:{x:{ticks:{maxTicksLimit:12}},y:{beginAtZero:true,ticks:{callback:v=>fmtNum(v)}}}}});
  chartInstances.push(c);
}
function mkBar(id,labels,data,label,color){
  const ctx=document.getElementById(id);if(!ctx)return;
  const c=new Chart(ctx,{type:'bar',data:{labels,datasets:[{label,data,backgroundColor:color,borderRadius:5}]},
    options:{plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{callback:v=>fmtNum(v)}}}}});
  chartInstances.push(c);
}
function mkPie(id,labels,data){
  const ctx=document.getElementById(id);if(!ctx)return;
  const pal=['#00875a','#1a6acc','#5b21b6','#b45309','#c2410c','#047857','#1d4ed8','#7c3aed'];
  const total=data.reduce((a,b)=>a+b,0);
  const c=new Chart(ctx,{type:'doughnut',data:{labels,datasets:[{data,backgroundColor:pal.slice(0,labels.length),borderWidth:3,borderColor:'#fff'}]},
    options:{plugins:{legend:{position:'right',labels:{generateLabels:chart=>chart.data.labels.map((l,i)=>{const v=chart.data.datasets[0].data[i];const p=total?v/total*100:0;return{text:`${l}: ${fmtNum(v)} (${p.toFixed(1)}%)`,fillStyle:chart.data.datasets[0].backgroundColor[i]};})}}}}});
  chartInstances.push(c);
}

          </label>
          <label style="display:flex;align-items:flex-start;gap:8px;cursor:pointer">
            <input type="radio" name="uploadMode" id="modeReplaceDates" value="replace_dates" style="margin-top:2px;width:auto">
            <div>
              <div style="font-size:12px;font-weight:700;color:#1a1e2e">➕ Add / Replace by Date Range</div>
              <div style="font-size:11px;color:#4a5068">Keep history from other dates. Only replaces rows for dates present in this file. Use this for incremental daily uploads where you want trends to accumulate over time.</div>
            </div>
          </label>
        </div>

        <button class="btn primary" onclick="doUpload()" style="display:inline-block;width:auto;padding:10px 24px">Upload & Process</button>
        <div id="uploadStatus" style="font-size:12px;margin-top:12px;color:var(--teal);font-weight:600"></div>
      </div>
      <div class="section-label">Recent Uploads</div>
      <div class="table-scroll" style="max-height:130px"><table><thead><tr><th>File</th><th>By</th><th>Rows</th><th>Date Range</th></tr></thead><tbody>
      ${log.map(l=>`<tr><td>${l.filename}</td><td>${l.uploaded_by}</td><td>${l.row_count}</td><td>${l.min_date} → ${l.max_date}</td></tr>`).join('')}
      </tbody></table></div>
      <div class="section-label">Users</div>
      <div class="table-scroll" style="max-height:160px"><table><thead><tr><th>Username</th><th>Role</th><th></th></tr></thead><tbody>
      ${users.map(u=>`<tr><td>${u.username}</td><td><span class="pill ${u.role==='admin'?'pill-purple':'pill-teal'}">${u.role}</span></td><td><button class="btn danger" style="padding:3px 9px;font-size:11px" onclick="delUser(${u.id})">Remove</button></td></tr>`).join('')}
      </tbody></table></div>
      <button class="btn" style="margin-top:10px;font-size:12px" onclick="document.getElementById('addUserForm').classList.remove('hidden')">+ Add User</button>
      <div id="addUserForm" class="hidden" style="margin-top:12px">
        <input id="nUser" placeholder="Username">
        <input id="nPass" type="password" placeholder="Password">
        <select id="nRole"><option value="viewer">Viewer</option><option value="admin">Admin</option></select>
        <button class="btn primary" onclick="createUser()">Create</button>
      </div>
      <div class="modal-actions"><button class="btn" onclick="closeModal()">Close</button></div>
    </div>
  </div>`;
}
function closeModal(){document.getElementById('modalRoot').innerHTML='';}
async function createUser(){
  const fd=new FormData();
  fd.append('username',document.getElementById('nUser').value);
  fd.append('password',document.getElementById('nPass').value);
  fd.append('role',document.getElementById('nRole').value);
  const r=await fetch('/api/users',{method:'POST',body:fd});
  r.ok?showToast('User created!')||openAdminPanel():showToast((await r.json()).detail||'Failed');
}
async function delUser(id){if(!confirm('Remove this user?'))return;await fetch('/api/users/'+id,{method:'DELETE'});openAdminPanel();}
async function doUpload(){
  const inp=document.getElementById('adminFile'),st=document.getElementById('uploadStatus');
  if(!inp.files[0]){st.textContent='Choose a file first.';return;}
  const modeEl=document.querySelector('input[name="uploadMode"]:checked');
  const mode=modeEl?modeEl.value:'replace_all';
  const modeLabel=mode==='replace_all'?'Replace All (wiping old data)':'Add/Replace by Date Range';
  st.textContent=`⏳ Uploading in mode: ${modeLabel} — please wait, large files may take 1-2 minutes…`;
  st.style.color='var(--amber)';
  const fd=new FormData();
  fd.append('file',inp.files[0]);
  fd.append('mode',mode);
  try{
    const r=await fetch('/api/upload',{method:'POST',body:fd});
    const j=await r.json();
    if(!r.ok){st.textContent='Error: '+(j.detail||'upload failed');st.style.color='var(--red)';return;}
    st.textContent=`✓ Uploaded ${j.rows.toLocaleString('en-IN')} rows (${j.date_range[0]} → ${j.date_range[1]}) · Mode: ${modeLabel}${j.skipped>0?' · '+j.skipped+' rows skipped (no valid date)':''}`;
    st.style.color='var(--teal)';
    await refreshAll();showToast('File uploaded — dashboard updated!');
  }catch(e){st.textContent='Network error: '+e.message;st.style.color='var(--red)';}
}

document.getElementById('loginPass')?.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
boot();
</script>
</body>
</html>
